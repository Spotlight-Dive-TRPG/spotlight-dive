name: Create Release (Booth ZIP)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release'
        required: true
        default: 'v1.0.0'
      name:
        description: 'Release name'
        required: false
        default: 'Spotlight Dive Release'
      body:
        description: 'Release notes'
        required: false
        default: 'Booth release bundle'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release and attach Booth ZIP
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.name || github.ref_name }}
          body: ${{ github.event.inputs.body }}
          files: |
            deepseek_release_20260404.zip
